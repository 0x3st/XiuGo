# Copy to config.yaml for local use (config.yaml is gitignored).

server:
  address:     ":8081"
  openapiPath: "/api.json"
  swaggerPath: "/swagger"
  serverRoot:  "resource/public"
  clientMaxBodySize: "32M"

logger:
  level : "all"
  stdout: true

database:
  default:
    # mysql:user:pass@tcp(host:3306)/dbname
    link: "mysql:USER:PASSWORD@tcp(127.0.0.1:3306)/xiuno"
    charset: "utf8mb4"
    debug: false

xiuno:
  # Upload directory for avatars, attachments, forum icons (required).
  uploadPath: "./upload"
  # Optional legacy Xiuno tree for one-time import of conf.php / smtp.conf.php.
  # Leave empty or omit after settings have been imported into bbs_kv.
  phpRoot: ""
  # Defaults used when bbs_kv has no xiugo_site yet and conf.php is absent.
  sitename: "XiuGo"
  sitebrief: ""
  runlevel: 5
  lang: "zh-cn"
  userCreateOn: 1
  userCreateEmailOn: 0
  userResetpwOn: 0
  timezone: "Asia/Shanghai"
  onlineHoldTime: 3600
  pagesize: 20
  postlistPagesize: 100
  orderDefault: "lastpid"
