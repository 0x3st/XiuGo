{{include "admin_compat/header.html" .}}
<div class="row"><div class="col-12"><div class="card"><div class="card-body"><form action="/admin/?forum-update-{{.Forum.Fid}}.htm" method="post" id="form"><h4 class="card-title">编辑版块 - {{.Forum.Name}}</h4>
<div class="form-group row"><label class="col-sm-2">版块名称：</label><div class="col-sm-10"><input class="form-control" name="name" value="{{.Forum.Name}}"></div></div>
<div class="form-group row"><label class="col-sm-2">排序：</label><div class="col-sm-3"><input class="form-control" name="rank" value="{{.Forum.Rank}}"></div></div>
<div class="form-group row"><label class="col-sm-2">版块介绍：</label><div class="col-sm-10"><textarea class="form-control" name="brief" style="height:80px">{{.Forum.Brief}}</textarea></div></div>
<div class="form-group row"><label class="col-sm-2">版块公告：</label><div class="col-sm-10"><textarea class="form-control" name="announcement" style="height:80px">{{.Forum.Announcement}}</textarea></div></div>
<div class="form-group row"><label class="col-sm-2">版主：</label><div class="col-sm-10"><input class="form-control" name="modnames" value="{{.Forum.Moderators}}"><p class="small text-muted mt-2">多个用户名请用英文逗号分隔。</p></div></div>
<div class="form-group row"><label class="col-sm-2">用户权限：</label><div class="col-sm-10"><p><label><input type="checkbox" name="accesson" value="1" {{if .Forum.Accesson}}checked{{end}}> 启用</label></p><div class="table-responsive {{if not .Forum.Accesson}}collapse{{end}}" id="accesslist_div"><table class="table text-small" id="accesslist"><thead><tr class="text-center"><td>全选</td><td class="text-left">用户组</td><td>查看</td><td>发主题</td><td>回复</td><td>上传</td><td>下载</td></tr></thead><tbody>
{{range .Rules}}<tr class="text-center"><td><input type="checkbox" name="checkall"></td><td class="text-left">{{.Name}}</td><td><input type="checkbox" name="allowread[{{.Gid}}]" value="1" {{if .Allowread}}checked{{end}}></td><td><input type="checkbox" name="allowthread[{{.Gid}}]" value="1" {{if .Allowthread}}checked{{end}}></td><td><input type="checkbox" name="allowpost[{{.Gid}}]" value="1" {{if .Allowpost}}checked{{end}}></td><td><input type="checkbox" name="allowattach[{{.Gid}}]" value="1" {{if .Allowattach}}checked{{end}}></td><td><input type="checkbox" name="allowdown[{{.Gid}}]" value="1" {{if .Allowdown}}checked{{end}}></td></tr>{{end}}
</tbody></table></div></div></div><div class="form-group row"><label class="col-sm-2"></label><div class="col-sm-10"><button class="btn btn-primary btn-block" id="submit">确定</button><a class="btn btn-secondary btn-block mt-3" href="javascript:history.back()">返回</a></div></div></form></div></div></div></div>
{{include "admin_compat/footer.html" .}}
<script>var f=$('#form'),s=$('#submit'),a=$('#accesslist_div');f.on('submit',function(){f.reset();s.button('loading');$.xpost(f.attr('action'),f.serialize(),function(code,message){if(code==0){$.alert(message);s.button('reset');}else{$.alert(message);s.button('reset');}});return false;});f.find('[name=accesson]').on('click',function(){a.toggle('fast');});a.find('tr').each(function(){var tr=$(this);tr.find('td').eq(0).find(':checkbox').on('click',function(){tr.find(':checkbox').prop('checked',this.checked);});});</script>
