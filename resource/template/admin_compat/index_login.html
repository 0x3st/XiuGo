{{include "admin_compat/header.html" .}}
<div class="row">
  <div class="col-lg-5 mx-auto">
    <div class="card">
      <div class="card-body">
        <h4>管理员登录</h4>
        <form action="/admin/?index-login.htm" method="post" id="form">
          <div class="form-group">为了您的安全，请再次输入账户密码：</div>
          <div class="form-group input-group">
            <div class="input-group-prepend">
              <span class="input-group-text"><i class="icon-lock"></i></span>
            </div>
            <input type="password" class="form-control" placeholder="密码" id="password" name="password" autocomplete="current-password">
          </div>
          <div class="form-group text-right">
            <button type="submit" class="btn btn-primary btn-block" id="submit" data-loading-text="正在提交...">登录</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{{include "admin_compat/footer.html" .}}
<script src="/view/js/md5.js"></script>
<script>
var jform = $('#form');
var jsubmit = $('#submit');
var jpassword = $('#password').focus();
jform.on('submit', function () {
  // Original jform.reset() only clears validation state (xiuno.js), not input values.
  jform.reset();
  jsubmit.button('loading');
  var postdata = jform.serializeObject();
  postdata.password = $.md5(postdata.password);
  $.xpost(jform.attr('action'), postdata, function (code, message) {
    if (code == 0) {
      jsubmit.button(message).delay(500).location('/admin/');
    } else if (code == 'password') {
      jpassword.alert(message).focus();
      jsubmit.button('reset');
    } else {
      alert(message);
      jsubmit.button('reset');
    }
  });
  return false;
});
</script>
