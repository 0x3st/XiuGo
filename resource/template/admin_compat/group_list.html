{{include "admin_compat/header.html" .}}
<div class="row"><div class="col-12"><div class="btn-group mb-3"><a class="btn btn-secondary" href="/admin/?user-list.htm">用户列表</a><a class="btn btn-secondary" href="/admin/?user-create.htm">创建用户</a><a class="btn btn-secondary active" href="/admin/?group-list.htm">用户组</a></div><div class="card"><div class="card-body"><form action="/admin/?group-list.htm" method="post" id="form"><div class="table-responsive arrlist"><table class="table" style="min-width:800px"><thead><tr class="text-center"><th width="100">用户组 ID</th><th>用户组名称</th><th>起始积分</th><th>结束积分</th><th>编辑</th><th>删除</th></tr></thead><tbody>
{{range .Groups}}<tr class="text-center" rowid="{{.Gid}}"><td><input class="form-control" name="_gid[{{.Gid}}]" value="{{.Gid}}"></td><td><input class="form-control" name="name[{{.Gid}}]" value="{{.Name}}"></td><td><input class="form-control" name="creditsfrom[{{.Gid}}]" value="{{.Creditsfrom}}"></td><td><input class="form-control" name="creditsto[{{.Gid}}]" value="{{.Creditsto}}"></td><td><a class="btn row_edit">编辑</a></td><td>{{if and (ne .Gid 0) (ne .Gid 1) (ne .Gid 2) (ne .Gid 3) (ne .Gid 4) (ne .Gid 5) (ne .Gid 6) (ne .Gid 7) (ne .Gid 101)}}<a class="btn row_delete">删除</a>{{end}}</td></tr>{{end}}
</tbody></table></div><p><a class="btn row_add">[+]增加一行</a></p><p class="text-center"><button class="btn btn-primary" id="submit" style="width:10rem">确定</button></p></form></div></div></div></div>
{{include "admin_compat/footer.html" .}}
<script>var maxgid={{.MaxID}},f=$('#form'),s=$('#submit'),list=$('.arrlist');f.on('submit',function(){f.reset();s.button('loading');$.xpost(f.attr('action'),f.serialize(),function(code,message){if(code==0){$.alert(message);s.text(message).delay(1000).location();}else{alert(message);s.button('reset');}});return false;});list.on('click','.row_edit',function(){location=xn.url('group-update-'+$(this).parents('tr').attr('rowid'));});list.on('click','.row_delete',function(){$(this).parents('tr').remove();});$('.row_add').on('click',function(){var clone=list.find('tbody tr').last().clone(),id=++maxgid;clone.attr('rowid',id);clone.find('input').not('[name^="_gid"]').val('');clone.find('input[name^="_gid"]').val(id);clone.find('input').attr_name_index(id);clone.find('td').last().html('<a class="btn row_delete">删除</a>');clone.appendTo(list.find('tbody'));});</script>
