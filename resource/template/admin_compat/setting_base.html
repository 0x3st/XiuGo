{{include "admin_compat/header.html" .}}
<div class="row"><div class="col-lg-12">
  <div class="btn-group mb-3" role="group"><a role="button" class="btn btn-secondary active" href="/admin/?setting-base.htm">基本设置</a><a role="button" class="btn btn-secondary" href="/admin/?setting-smtp.htm">SMTP 设置</a></div>
  <div class="card"><div class="card-body"><form action="/admin/?setting-base.htm" method="post" id="form">
    <div class="form-group row"><label class="col-sm-2 form-control-label">站点名称：</label><div class="col-sm-10"><input class="form-control" name="sitename" value="{{.Settings.Sitename}}"></div></div>
    <div class="form-group row"><label class="col-sm-2 form-control-label">站点介绍：</label><div class="col-sm-10"><textarea class="form-control" name="sitebrief" style="height:100px">{{.Settings.Sitebrief}}</textarea><p class="mt-2 text-grey small">简短介绍站点内容。</p></div></div>
    <div class="form-group row"><label class="col-sm-2 form-control-label">站点运行级别：</label><div class="col-sm-10">
      <label class="mr-3"><input type="radio" name="runlevel" value="0" {{if eq .Settings.Runlevel 0}}checked{{end}}> 关闭站点</label><label class="mr-3"><input type="radio" name="runlevel" value="1" {{if eq .Settings.Runlevel 1}}checked{{end}}> 管理员可读写</label><label class="mr-3"><input type="radio" name="runlevel" value="2" {{if eq .Settings.Runlevel 2}}checked{{end}}> 会员只读</label><label class="mr-3"><input type="radio" name="runlevel" value="3" {{if eq .Settings.Runlevel 3}}checked{{end}}> 会员可读写</label><label class="mr-3"><input type="radio" name="runlevel" value="4" {{if eq .Settings.Runlevel 4}}checked{{end}}> 所有人只读</label><label><input type="radio" name="runlevel" value="5" {{if eq .Settings.Runlevel 5}}checked{{end}}> 所有人可读写</label>
    </div></div>
    <div class="form-group row"><label class="col-sm-2 form-control-label">允许用户注册：</label><div class="col-sm-10"><label class="mr-3"><input type="radio" name="user_create_on" value="1" {{if .Settings.UserCreateOn}}checked{{end}}> 是</label><label><input type="radio" name="user_create_on" value="0" {{if eq .Settings.UserCreateOn 0}}checked{{end}}> 否</label></div></div>
    <div class="form-group row"><label class="col-sm-2 form-control-label">注册邮箱验证：</label><div class="col-sm-10"><label class="mr-3"><input type="radio" name="user_create_email_on" value="1" {{if .Settings.UserCreateEmailOn}}checked{{end}}> 是</label><label><input type="radio" name="user_create_email_on" value="0" {{if eq .Settings.UserCreateEmailOn 0}}checked{{end}}> 否</label></div></div>
    <div class="form-group row"><label class="col-sm-2 form-control-label">允许找回密码：</label><div class="col-sm-10"><label class="mr-3"><input type="radio" name="user_resetpw_on" value="1" {{if .Settings.UserResetpwOn}}checked{{end}}> 是</label><label><input type="radio" name="user_resetpw_on" value="0" {{if eq .Settings.UserResetpwOn 0}}checked{{end}}> 否</label></div></div>
    <div class="form-group row"><label class="col-sm-2 form-control-label">语言：</label><div class="col-sm-10"><select class="form-control" name="lang"><option value="zh-cn" {{if eq .Settings.Lang "zh-cn"}}selected{{end}}>简体中文</option><option value="zh-tw" {{if eq .Settings.Lang "zh-tw"}}selected{{end}}>繁体中文</option><option value="en-us" {{if eq .Settings.Lang "en-us"}}selected{{end}}>English</option><option value="ru-ru" {{if eq .Settings.Lang "ru-ru"}}selected{{end}}>Русский</option><option value="th-th" {{if eq .Settings.Lang "th-th"}}selected{{end}}>ไทย</option></select></div></div>
    <div class="form-group row"><label class="col-sm-2"></label><div class="col-sm-10"><button type="submit" class="btn btn-primary btn-block" id="submit" data-loading-text="正在提交...">确定</button></div></div>
  </form><p class="text-muted small mt-3">站点配置保存在数据库 <code>bbs_kv</code>（键 <code>xiugo_site</code>），不再写入 PHP conf.php。</p></div></div>
</div></div>
{{include "admin_compat/footer.html" .}}
<script>var jform=$('#form'),jsubmit=$('#submit');jform.on('submit',function(){jform.reset();jsubmit.button('loading');$.xpost(jform.attr('action'),jform.serialize(),function(code,message){if(code==0){$.alert(message);jsubmit.text(message).delay(1000).button('reset');}else{alert(message);jsubmit.button('reset');}});return false;});</script>
