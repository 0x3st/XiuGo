{{include "admin_compat/header.html" .}}
<div class="row"><div class="col-12"><div class="btn-group mb-3"><a class="btn btn-secondary" href="/admin/?user-list.htm">用户列表</a><a class="btn btn-secondary" href="/admin/?user-create.htm">创建用户</a><a class="btn btn-secondary active" href="/admin/?group-list.htm">用户组</a></div><div class="card"><div class="card-body"><form action="/admin/?group-update-{{.Group.Gid}}.htm" method="post" id="form"><h4>编辑用户组 - {{.Group.Name}}</h4>
<div class="form-group row"><label class="col-sm-2">名称：</label><div class="col-sm-10"><input class="form-control" name="name" value="{{.Group.Name}}"></div></div><div class="form-group row"><label class="col-sm-2">起始积分：</label><div class="col-sm-10"><input class="form-control" name="creditsfrom" value="{{.Group.Creditsfrom}}"></div></div><div class="form-group row"><label class="col-sm-2">结束积分：</label><div class="col-sm-10"><input class="form-control" name="creditsto" value="{{.Group.Creditsto}}"></div></div>
<div class="form-group row"><label class="col-sm-2">用户权限：</label><div class="col-sm-10"><div class="table-responsive"><table class="table text-center"><tr><td>查看</td><td>发主题</td><td>回复</td><td>上传</td><td>下载</td></tr><tr><td><input type="checkbox" name="allowread" value="1" {{if .Group.Allowread}}checked{{end}}></td><td><input type="checkbox" name="allowthread" value="1" {{if .Group.Allowthread}}checked{{end}} {{if eq .Group.Gid 0}}disabled{{end}}></td><td><input type="checkbox" name="allowpost" value="1" {{if .Group.Allowpost}}checked{{end}} {{if eq .Group.Gid 0}}disabled{{end}}></td><td><input type="checkbox" name="allowattach" value="1" {{if .Group.Allowattach}}checked{{end}} {{if eq .Group.Gid 0}}disabled{{end}}></td><td><input type="checkbox" name="allowdown" value="1" {{if .Group.Allowdown}}checked{{end}}></td></tr></table></div></div></div>
{{if and (ge .Group.Gid 1) (le .Group.Gid 5)}}<div class="form-group row"><label class="col-sm-2">管理权限：</label><div class="col-sm-10"><div class="table-responsive"><table class="table text-center"><tr><td>置顶</td><td>编辑</td><td>删除</td><td>移动</td><td>禁止用户</td><td>删除用户</td><td>查看 IP</td></tr><tr><td><input type="checkbox" name="allowtop" value="1" {{if .Group.Allowtop}}checked{{end}}></td><td><input type="checkbox" name="allowupdate" value="1" {{if .Group.Allowupdate}}checked{{end}}></td><td><input type="checkbox" name="allowdelete" value="1" {{if .Group.Allowdelete}}checked{{end}}></td><td><input type="checkbox" name="allowmove" value="1" {{if .Group.Allowmove}}checked{{end}}></td><td><input type="checkbox" name="allowbanuser" value="1" {{if .Group.Allowbanuser}}checked{{end}}></td><td><input type="checkbox" name="allowdeleteuser" value="1" {{if .Group.Allowdeleteuser}}checked{{end}}></td><td><input type="checkbox" name="allowviewip" value="1" {{if .Group.Allowviewip}}checked{{end}}></td></tr></table></div></div></div>{{end}}
<div class="form-group row"><label class="col-sm-2"></label><div class="col-sm-10"><button class="btn btn-primary btn-block" id="submit">确定</button><a class="btn btn-secondary btn-block mt-3" href="javascript:history.back()">返回</a></div></div></form></div></div></div></div>
{{include "admin_compat/footer.html" .}}
<script>var f=$('#form'),s=$('#submit');f.on('submit',function(){f.reset();s.button('loading');$.xpost(f.attr('action'),f.serialize(),function(code,message){if(code==0){$.alert(message);s.button('reset');}else{$.alert(message);s.button('reset');}});return false;});</script>
