{{include "admin_compat/header.html" .}}
<div class="row"><div class="col-12"><div class="btn-group mb-3"><a class="btn btn-secondary active" href="/admin/?plugin-local.htm">本地插件</a><a class="btn btn-secondary" href="/admin/?plugin-official_free.htm">官方免费插件</a><a class="btn btn-secondary" href="/admin/?plugin-official_fee.htm">官方收费插件</a></div><div class="card"><div class="card-body"><div class="row">
{{range .Plugins}}<div class="col-md-6 mb-3"><div class="card"><div class="card-body"><h5>{{.Name}} <small class="text-muted">{{.Version}}</small></h5><p>{{.Brief}}</p><p><code>{{.Dir}}</code></p>{{if not .Installed}}<a class="btn btn-primary plugin-action" href="/admin/?plugin-install-{{.Dir}}.htm">安装</a>{{else if .Enabled}}<a class="btn btn-secondary plugin-action" href="/admin/?plugin-disable-{{.Dir}}.htm">禁用</a> <a class="btn btn-danger plugin-action" href="/admin/?plugin-unstall-{{.Dir}}.htm">卸载</a>{{else}}<a class="btn btn-primary plugin-action" href="/admin/?plugin-enable-{{.Dir}}.htm">启用</a> <a class="btn btn-danger plugin-action" href="/admin/?plugin-unstall-{{.Dir}}.htm">卸载</a>{{end}}</div></div></div>{{else}}<div class="col-12 text-muted">当前原版 plugin 目录没有本地插件。</div>{{end}}
</div></div></div></div></div>
{{include "admin_compat/footer.html" .}}
<script>$('.plugin-action').on('click',function(e){e.preventDefault();var href=$(this).attr('href');$.xget(href,function(code,message){if(code==0){$.alert(message);setTimeout(function(){location.reload()},500)}else $.alert(message);});});</script>
