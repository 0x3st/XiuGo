{{include "admin_compat/header.html" .}}
<div class="row"><div class="col-12"><form action="/admin/?thread-scan.htm" method="post" id="form"><div class="card card-body"><h4>搜索条件</h4><div class="row"><div class="col-md-6 form-group"><label>版块：</label><select class="form-control" name="fid" id="fid"><option value="0"></option>{{range .Forums}}<option value="{{.Fid}}" data-threads="{{.Threads}}">{{.Name}}</option>{{end}}</select></div><div class="col-md-6 form-group"><label>关键词：</label><input class="form-control" name="keyword"></div></div><div class="row"><div class="col-md-6 form-group"><label>开始日期：</label><input type="date" class="form-control" name="create_date_start"></div><div class="col-md-6 form-group"><label>结束日期：</label><input type="date" class="form-control" name="create_date_end"></div></div><div class="row"><div class="col-md-6 form-group"><label>发帖 IP：</label><input class="form-control" name="userip"></div><div class="col-md-6 form-group"><label>用户 ID：</label><input class="form-control" name="uid"></div></div><button type="button" id="search" class="btn btn-primary">搜索</button></div></form>
<div class="card"><div class="card-body" id="search_result"><div class="progress mt-4"><div class="progress-bar progress-bar-striped progress-bar-animated" style="width:0" id="progress"></div></div>搜索到 <b id="threads">0</b> 个主题，<a href="/admin/?thread-found.htm" target="_blank"><b>点击查看</b></a><p id="operation" class="mt-4" style="display:none"><button id="close" class="btn btn-primary">关闭</button> <button id="open" class="btn btn-primary">打开</button> <button id="delete" class="btn btn-danger">删除</button></p></div></div></div></div>
{{include "admin_compat/footer.html" .}}
<script>var f=$('#form'),search=$('#search'),progress=$('#progress'),count=$('#threads'),ops=$('#operation'),pages={{.TotalPages}},found=0;function scan(page,done){var data=f.serializeObject();data.page=page;$.xpost(f.attr('action'),data,function(code,message){if(code!=0){alert(message);return done(false)}found+=message.length;count.text(found);progress.width((page/pages)*100+'%');done(true);});}search.on('click',function(){found=0;count.text(0);progress.width(0);search.button('loading');var page=1;function next(ok){if(!ok||page>=pages){search.button('reset');if(ok)ops.show();return}scan(++page,next)}scan(page,next);});ops.find('button').on('click',function(){var button=$(this),op=button.attr('id');button.button('loading');function work(){ $.xpost(xn.url('thread-operation-'+op),{},function(code,message){if(code!=0){button.button('reset');return alert(message)}if(message.length==101)return work();button.text('操作完成');});}work();});</script>
