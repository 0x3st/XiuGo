{{include "admin_compat/header.html" .}}
<div class="row"><div class="col-12"><div class="card"><div class="card-body">
<form action="/admin/?forum-list.htm" method="post" id="form"><div class="table-responsive arrlist"><table class="table" style="min-width:800px"><thead><tr class="text-center"><th width="80">版块 ID</th><th width="60" class="text-left">图标</th><th width="130"></th><th>版块名称</th><th width="100">排序</th><th width="100">编辑</th><th width="100">删除</th></tr></thead><tbody>
{{range .Forums}}<tr class="text-center" rowid="{{.Fid}}"><td><input class="form-control" name="fid[{{.Fid}}]" value="{{.Fid}}"></td><td class="text-left"><img src="{{.IconURL}}" class="forum" width="48" id="img_{{.Fid}}"></td><td><input type="file" accept=".jpg,.jpeg,.png,.gif,.bmp" class="form-control" name="icon[{{.Fid}}]" data-assoc="img_{{.Fid}}"></td><td><input class="form-control" name="name[{{.Fid}}]" value="{{.Name}}"></td><td><input class="form-control" name="rank[{{.Fid}}]" value="{{.Rank}}"></td><td><a class="btn row_edit">编辑</a></td><td><a class="btn row_delete">删除</a></td></tr>{{end}}
</tbody></table></div><p><a class="btn row_add">[+]增加一行</a></p><p class="text-center"><button type="submit" class="btn btn-primary" id="submit" data-loading-text="正在提交..." style="width:10rem">确定</button></p></form><p class="small text-grey">提示：删除一行并保存会按照原版逻辑级联删除该版块内容；默认版块 ID 1 会保留。</p>
</div></div></div></div>
{{include "admin_compat/footer.html" .}}
<script>
var maxfid={{.MaxID}},f=$('#form'),s=$('#submit'),list=$('.arrlist');f.base64_encode_file();f.on('submit',function(){f.reset();s.button('loading');$.xpost(f.attr('action'),f.serialize(),function(code,message){if(code==0){$.alert(message);s.text(message).delay(1000).location();}else{alert(message);s.button('reset');}});return false;});list.on('click','.row_edit',function(){location=xn.url('forum-update-'+$(this).parents('tr').attr('rowid'));});list.on('click','.row_delete',function(){var tr=$(this).parents('tr');if(tr.attr('rowid')==1)return $.alert('默认版块不能删除');tr.remove();});$('.row_add').on('click',function(){var clone=list.find('tbody tr').last().clone(),id=++maxfid;clone.attr('rowid',id);clone.find('input').not('[name^="fid"]').val('');clone.find('input[name^="fid"]').val(id);clone.find('input').attr_name_index(id);clone.find('img').attr({id:'img_'+id,src:'/view/img/forum.png'});clone.find('input[type=file]').attr('data-assoc','img_'+id);clone.appendTo(list.find('tbody'));});
</script>
