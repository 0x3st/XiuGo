<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>{{.Title}}</title><link rel="stylesheet" href="/view/css/bootstrap.css"><link rel="stylesheet" href="/view/css/bootstrap-bbs.css"></head><body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark"><div class="container"><a class="navbar-brand" href="/admin/">XiuGo</a><div class="navbar-nav mr-auto"><a class="nav-item nav-link" href="/admin/">概览</a><a class="nav-item nav-link" href="/admin/settings">设置</a><a class="nav-item nav-link" href="/admin/threads">主题</a><a class="nav-item nav-link" href="/admin/users">用户</a><a class="nav-item nav-link" href="/admin/forums">版块</a><a class="nav-item nav-link" href="/admin/groups">用户组</a><a class="nav-item nav-link" href="/admin/maintenance">维护</a><a class="nav-item nav-link" href="/admin/themes">主题</a><a class="nav-item nav-link" href="/admin/plugins">扩展</a><a class="nav-item nav-link" href="/">前台</a></div><span class="navbar-text">{{.User.Username}}</span></div></nav>
<main class="container py-4"><div class="d-flex justify-content-between align-items-center mb-3"><h3 class="mb-0">板块管理</h3><a class="btn btn-primary" href="/admin/forum/create">新建板块</a></div><div class="card"><div class="table-responsive"><table class="table table-hover mb-0"><thead><tr><th>ID</th><th>板块</th><th>排序</th><th>主题/今日帖</th><th>访问控制</th><th class="text-right">操作</th></tr></thead><tbody>{{range .Forums}}<tr><td>{{.Fid}}</td><td><strong>{{.Name}}</strong><div class="small text-muted">{{.Brief}}</div></td><td>{{.Rank}}</td><td>{{.Threads}} / {{.Todayposts}}</td><td>{{if .Accesson}}<span class="badge badge-warning">已启用</span>{{else}}<span class="badge badge-light">用户组默认</span>{{end}}</td><td class="text-right"><a class="btn btn-sm btn-outline-primary" href="/admin/forum/{{.Fid}}/edit">编辑</a>{{if ne .Fid 1}} <form class="d-inline" method="post" action="/admin/forum/{{.Fid}}/delete" onsubmit="return confirm('仅空板块可删除，确定继续吗？')"><button class="btn btn-sm btn-outline-danger">删除</button></form>{{end}}</td></tr>{{end}}</tbody></table></div></div></main></body></html>
