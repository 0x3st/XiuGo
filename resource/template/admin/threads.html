<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>{{.Title}}</title><link rel="stylesheet" href="/view/css/bootstrap.css"><link rel="stylesheet" href="/view/css/bootstrap-bbs.css"></head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark"><div class="container"><a class="navbar-brand" href="/admin/">XiuGo</a><div class="navbar-nav mr-auto"><a class="nav-item nav-link" href="/admin/">概览</a><a class="nav-item nav-link" href="/admin/settings">设置</a><a class="nav-item nav-link" href="/admin/threads">主题</a><a class="nav-item nav-link" href="/admin/users">用户</a><a class="nav-item nav-link" href="/admin/forums">版块</a><a class="nav-item nav-link" href="/admin/groups">用户组</a><a class="nav-item nav-link" href="/admin/maintenance">维护</a><a class="nav-item nav-link" href="/">前台</a></div><span class="navbar-text">{{.User.Username}}</span></div></nav>
<main class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-3"><h3 class="mb-0">主题管理</h3><form class="form-inline" method="get"><input class="form-control form-control-sm mr-2" name="keyword" value="{{.Keyword}}" placeholder="搜索标题"><button class="btn btn-sm btn-outline-primary">搜索</button></form></div>
  <div class="card"><div class="table-responsive"><table class="table table-hover mb-0"><thead><tr><th>ID</th><th>主题</th><th>板块/作者</th><th>回复/浏览</th><th>状态</th><th class="text-right">操作</th></tr></thead><tbody>
  {{range .Threads}}<tr><td>{{.Tid}}</td><td><a href="/thread/{{.Tid}}">{{.Subject}}</a><div class="small text-muted">{{.CreateTime}}</div></td><td>{{.ForumName}}<div class="small text-muted">{{.Username}}</div></td><td>{{.Posts}} / {{.Views}}</td><td>{{if .Closed}}<span class="badge badge-secondary">已关闭</span>{{else}}<span class="badge badge-success">开放</span>{{end}}</td><td class="text-right text-nowrap"><form class="d-inline" method="post" action="/admin/thread/{{.Tid}}/close"><input type="hidden" name="closed" value="{{if .Closed}}0{{else}}1{{end}}"><button class="btn btn-sm btn-outline-secondary">{{if .Closed}}打开{{else}}关闭{{end}}</button></form> <form class="d-inline" method="post" action="/admin/thread/{{.Tid}}/delete" onsubmit="return confirm('确定删除这个主题及全部回复吗？')"><button class="btn btn-sm btn-outline-danger">删除</button></form></td></tr>{{else}}<tr><td colspan="6" class="text-center text-muted py-5">没有找到主题</td></tr>{{end}}
  </tbody></table></div></div>
</main>
</body></html>
