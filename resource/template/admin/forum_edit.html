<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>{{.Title}}</title><link rel="stylesheet" href="/view/css/bootstrap.css"><link rel="stylesheet" href="/view/css/bootstrap-bbs.css"></head><body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark"><div class="container"><a class="navbar-brand" href="/admin/">XiuGo</a><div class="navbar-nav mr-auto"><a class="nav-item nav-link" href="/admin/">概览</a><a class="nav-item nav-link" href="/admin/settings">设置</a><a class="nav-item nav-link" href="/admin/threads">主题</a><a class="nav-item nav-link" href="/admin/users">用户</a><a class="nav-item nav-link" href="/admin/forums">版块</a><a class="nav-item nav-link" href="/admin/groups">用户组</a><a class="nav-item nav-link" href="/admin/maintenance">维护</a><a class="nav-item nav-link" href="/admin/themes">主题</a><a class="nav-item nav-link" href="/admin/credits">积分</a><a class="nav-item nav-link" href="/admin/plugins">扩展</a><a class="nav-item nav-link" href="/">前台</a></div><span class="navbar-text">{{.User.Username}}</span></div></nav><main class="container py-4"><form method="post">{{if .Error}}<div class="alert alert-danger">{{.Error}}</div>{{end}}<div class="card mb-3"><div class="card-header">编辑板块 #{{.Forum.Fid}}</div><div class="card-body"><div class="form-row"><div class="form-group col-md-8"><label>名称</label><input class="form-control" name="name" maxlength="16" value="{{.Forum.Name}}" required></div><div class="form-group col-md-4"><label>排序</label><input class="form-control" type="number" min="0" name="rank" value="{{.Forum.Rank}}"></div></div><div class="form-group"><label>简介</label><textarea class="form-control" name="brief" rows="3">{{.Forum.Brief}}</textarea></div><div class="form-group"><label>公告</label><textarea class="form-control" name="announcement" rows="3">{{.Forum.Announcement}}</textarea></div><div class="form-group"><label>版主用户名</label><input class="form-control" name="moderators" value="{{.Forum.Moderators}}" placeholder="多个用户名用英文逗号分隔"></div><div class="custom-control custom-checkbox"><input class="custom-control-input" type="checkbox" id="accesson" name="accesson" value="1" {{if .Forum.Accesson}}checked{{end}}><label class="custom-control-label" for="accesson">启用板块独立权限</label></div></div></div>
<div class="card mb-3"><div class="card-header">板块访问权限</div><div class="table-responsive"><table class="table table-sm mb-0"><thead><tr><th>用户组</th><th>查看</th><th>发主题</th><th>回复</th><th>上传</th><th>下载</th></tr></thead><tbody>{{range .Rules}}<tr><td>{{.Name}} <span class="text-muted">#{{.Gid}}</span></td><td><input type="checkbox" name="allowread_{{.Gid}}" value="1" {{if .Allowread}}checked{{end}}></td><td><input type="checkbox" name="allowthread_{{.Gid}}" value="1" {{if .Allowthread}}checked{{end}}></td><td><input type="checkbox" name="allowpost_{{.Gid}}" value="1" {{if .Allowpost}}checked{{end}}></td><td><input type="checkbox" name="allowattach_{{.Gid}}" value="1" {{if .Allowattach}}checked{{end}}></td><td><input type="checkbox" name="allowdown_{{.Gid}}" value="1" {{if .Allowdown}}checked{{end}}></td></tr>{{end}}</tbody></table></div></div><div class="text-right"><a class="btn btn-secondary" href="/admin/forums">取消</a> <button class="btn btn-primary">保存板块与权限</button></div></form></main></body></html>
