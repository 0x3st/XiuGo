<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>{{.Title}}</title><link rel="stylesheet" href="/view/css/bootstrap.css"><link rel="stylesheet" href="/view/css/bootstrap-bbs.css"></head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark"><div class="container"><a class="navbar-brand" href="/admin/">XiuGo</a><div class="navbar-nav mr-auto"><a class="nav-item nav-link" href="/admin/">概览</a><a class="nav-item nav-link" href="/admin/settings">设置</a><a class="nav-item nav-link" href="/admin/threads">主题</a><a class="nav-item nav-link" href="/admin/users">用户</a><a class="nav-item nav-link" href="/admin/forums">版块</a><a class="nav-item nav-link" href="/admin/groups">用户组</a><a class="nav-item nav-link" href="/admin/maintenance">维护</a><a class="nav-item nav-link" href="/admin/themes">主题</a><a class="nav-item nav-link" href="/admin/credits">积分</a><a class="nav-item nav-link" href="/admin/plugins">扩展</a><a class="nav-item nav-link" href="/">前台</a></div><span class="navbar-text">{{.User.Username}}</span></div></nav>
<main class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4"><div><h3 class="mb-1">管理后台</h3><div class="text-muted">XiuGo 管理后台</div></div><span class="badge badge-success p-2"></span></div>
  <div class="row">
    <div class="col-md-4"><div class="card mb-3"><div class="card-body"><div class="text-muted">主题数</div><div class="display-4">{{.Stats.Threads}}</div></div></div></div>
    <div class="col-md-4"><div class="card mb-3"><div class="card-body"><div class="text-muted">帖子数</div><div class="display-4">{{.Stats.Posts}}</div></div></div></div>
    <div class="col-md-4"><div class="card mb-3"><div class="card-body"><div class="text-muted">用户数</div><div class="display-4">{{.Stats.Users}}</div></div></div></div>
  </div>
  <div class="card"><div class="card-header">快捷管理</div><div class="card-body"><a class="btn btn-primary mr-2" href="/admin/threads">管理主题</a><a class="btn btn-outline-secondary mr-2" href="/admin/users">管理用户</a><a class="btn btn-outline-secondary mr-2" href="/admin/forums">管理板块</a><a class="btn btn-outline-secondary" href="/admin/groups">管理用户组</a></div></div>
</main>
</body></html>
