<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>{{.Title}}</title><link rel="stylesheet" href="/view/css/bootstrap.css"><link rel="stylesheet" href="/view/css/bootstrap-bbs.css"></head><body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark"><div class="container"><a class="navbar-brand" href="/admin/">XiuGo</a><div class="navbar-nav mr-auto"><a class="nav-item nav-link" href="/admin/">概览</a><a class="nav-item nav-link" href="/admin/settings">设置</a><a class="nav-item nav-link" href="/admin/threads">主题</a><a class="nav-item nav-link" href="/admin/users">用户</a><a class="nav-item nav-link" href="/admin/forums">版块</a><a class="nav-item nav-link" href="/admin/groups">用户组</a><a class="nav-item nav-link" href="/admin/maintenance">维护</a><a class="nav-item nav-link" href="/admin/themes">主题</a><a class="nav-item nav-link" href="/admin/credits">积分</a><a class="nav-item nav-link" href="/admin/plugins">扩展</a><a class="nav-item nav-link" href="/">前台</a></div><span class="navbar-text">{{.User.Username}}</span></div></nav><main class="container py-4"><form method="post">{{if .Error}}<div class="alert alert-danger">{{.Error}}</div>{{end}}<div class="card mb-3"><div class="card-header">编辑 {{.Group.Name}}（GID {{.Group.Gid}}）</div><div class="card-body"><div class="form-row"><div class="form-group col-md-6"><label>名称</label><input class="form-control" name="name" value="{{.Group.Name}}" required></div><div class="form-group col-md-3"><label>积分起点</label><input class="form-control" type="number" name="creditsfrom" value="{{.Group.Creditsfrom}}"></div><div class="form-group col-md-3"><label>积分终点</label><input class="form-control" type="number" name="creditsto" value="{{.Group.Creditsto}}"></div></div><h6>普通权限</h6><div class="row">{{$g := .Group}}<div class="col-md-4"><label><input type="checkbox" name="allowread" value="1" {{if $g.Allowread}}checked{{end}}> 允许查看</label></div><div class="col-md-4"><label><input type="checkbox" name="allowthread" value="1" {{if $g.Allowthread}}checked{{end}}> 允许发主题</label></div><div class="col-md-4"><label><input type="checkbox" name="allowpost" value="1" {{if $g.Allowpost}}checked{{end}}> 允许回复</label></div><div class="col-md-4"><label><input type="checkbox" name="allowattach" value="1" {{if $g.Allowattach}}checked{{end}}> 允许上传</label></div><div class="col-md-4"><label><input type="checkbox" name="allowdown" value="1" {{if $g.Allowdown}}checked{{end}}> 允许下载</label></div></div>{{if and (ge .Group.Gid 1) (le .Group.Gid 5)}}<hr><h6>管理权限</h6><div class="row"><div class="col-md-4"><label><input type="checkbox" name="allowtop" value="1" {{if $g.Allowtop}}checked{{end}}> 置顶</label></div><div class="col-md-4"><label><input type="checkbox" name="allowupdate" value="1" {{if $g.Allowupdate}}checked{{end}}> 编辑</label></div><div class="col-md-4"><label><input type="checkbox" name="allowdelete" value="1" {{if $g.Allowdelete}}checked{{end}}> 删除</label></div><div class="col-md-4"><label><input type="checkbox" name="allowmove" value="1" {{if $g.Allowmove}}checked{{end}}> 移动</label></div><div class="col-md-4"><label><input type="checkbox" name="allowbanuser" value="1" {{if $g.Allowbanuser}}checked{{end}}> 禁止用户</label></div><div class="col-md-4"><label><input type="checkbox" name="allowdeleteuser" value="1" {{if $g.Allowdeleteuser}}checked{{end}}> 删除用户</label></div><div class="col-md-4"><label><input type="checkbox" name="allowviewip" value="1" {{if $g.Allowviewip}}checked{{end}}> 查看 IP</label></div></div>{{end}}</div></div><div class="text-right"><a class="btn btn-secondary" href="/admin/groups">取消</a> <button class="btn btn-primary">保存用户组</button></div></form></main></body></html>
