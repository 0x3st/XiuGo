{{include "layout/header.html" .}}
<div class="row">
  <div class="col-lg-6 mx-auto">
    <div class="card">
      <div class="card-header">设置新密码</div>
      <div class="card-body">
        <form action="/reset-password/complete" method="post" id="form">
          <div class="form-group input-group">
            <div class="input-group-prepend"><span class="input-group-text"><i class="icon icon-lock icon-fw"></i></span></div>
            <input type="password" class="form-control" placeholder="新密码" name="password" id="password" required>
          </div>
          <div class="form-group input-group">
            <div class="input-group-prepend"><span class="input-group-text"><i class="icon icon-lock icon-fw"></i></span></div>
            <input type="password" class="form-control" placeholder="重复密码" name="password_repeat" id="password_repeat" required>
          </div>
          <div class="form-group">
            <button type="submit" class="btn btn-primary btn-block" id="submit" data-loading-text="正在提交...">完成</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{{include "layout/footer.html" .}}
