{{include "layout/header.html" .}}
<div class="row">
  <div class="col-lg-10 mx-auto">
    <div class="card">
      <div class="card-header">编辑帖子</div>
      <div class="card-body">
        <form action="/post/{{.Post.Pid}}/edit" method="post" id="form">
          <input type="hidden" name="doctype" value="{{.Post.Doctype}}" />
          <input type="hidden" name="quotepid" value="{{.Post.Quotepid}}" />
          {{if .Post.Isfirst}}
          <div class="form-group">
            <input type="text" class="form-control" placeholder="标题" name="subject" value="{{.Post.Subject}}" id="subject">
          </div>
          {{end}}
          <div class="form-group">
            <textarea class="form-control" placeholder="内容" name="message" id="message" style="height: 300px;">{{.Post.Message}}</textarea>
          </div>
          <div class="d-flex justify-content-between">
            <div class="attachlist_parent">
              <a class="small text-left" href="javascript:void(0)">
                <label class="addattach" id="addattach">
                  <i class="icon-folder-open-o"></i> 添加附件
                  <input type="file" multiple="multiple" class="invisible" />
                </label>
              </a>
              {{if or .Post.Files .Pending}}
              <fieldset class="fieldset">
                <legend>上传的附件：</legend>
                <ul class="attachlist">
                  {{range .Post.Files}}
                  <li aid="{{.Aid}}"><a href="/attach/{{.Aid}}/download" target="_blank"><i class="icon filetype {{.Filetype}}"></i> {{.Orgfilename}}</a> <a href="javascript:void(0);" class="delete ml-2"><i class="icon-remove"></i> 删除</a></li>
                  {{end}}
                  {{range .Pending}}
                  <li aid="{{.ID}}"><a href="{{.URL}}" target="_blank"><i class="icon filetype {{.Filetype}}"></i> {{.Orgfilename}}</a> <a href="javascript:void(0);" class="delete ml-2"><i class="icon-remove"></i> 删除</a></li>
                  {{end}}
                </ul>
              </fieldset>
              {{end}}
            </div>
            <div class="text-right">
              <button type="submit" class="btn btn-primary" id="submit" data-loading-text="正在提交..."> 编辑 </button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{{include "layout/footer.html" .}}
