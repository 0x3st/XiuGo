{{include "layout/header.html" .}}
<div class="row">
  <div class="col-lg-6 mx-auto">
    <div class="card">
      <div class="card-header">用户注册</div>
      <div class="card-body">
        <form action="/register" method="post" id="form">
          <div class="form-group input-group">
            <div class="input-group-prepend"><span class="input-group-text"><i class="icon icon-envelope icon-fw"></i></span></div>
            <input type="email" class="form-control" placeholder="邮箱" name="email" id="email" required>
          </div>
          <div class="form-group input-group">
            <div class="input-group-prepend"><span class="input-group-text"><i class="icon icon-user icon-fw"></i></span></div>
            <input type="text" class="form-control" placeholder="用户名" name="username" id="username">
          </div>
          <div class="media">
            <div class="media-body">
              <div class="form-group input-group">
                <div class="input-group-prepend"><span class="input-group-text"><i class="icon icon-lock icon-fw"></i></span></div>
                <input type="password" class="form-control" placeholder="密码" name="password" id="password">
              </div>
            </div>
          </div>
          {{if .Site.UserCreateEmailOn}}
          <div class="media">
            <div class="media-body">
              <div class="form-group input-group">
                <div class="input-group-prepend"><span class="input-group-text"><i class="icon icon-barcode icon-fw"></i></span></div>
                <input type="text" class="form-control" placeholder="验证码" name="code" id="code">
              </div>
            </div>
            <div class="align-self-center ml-1">
              <button type="button" class="btn btn-primary btn-sm ml-3 form-group" id="sendcode" data-loading-text="正在发送..." action="/register/send-code">发送验证码</button>
            </div>
          </div>
          {{end}}
          <div class="form-group">
            <button type="submit" class="btn btn-primary btn-block" id="submit" data-loading-text="正在提交..." {{if .Site.UserCreateEmailOn}}disabled{{end}}>下一步</button>
          </div>
          <div class="media">
            <div></div>
            <div class="media-body text-right">
              <a href="/login" class="text-muted"><small>用户登录</small></a>
              {{if .Site.UserResetpwOn}}<a href="/reset-password" class="text-muted ml-3"><small>忘记密码</small></a>{{end}}
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{{include "layout/footer.html" .}}
