{{include "layout/header.html" .}}
<div class="row">
  <div class="col-lg-6 mx-auto">
    <div class="card">
      <div class="card-header">找回密码</div>
      <div class="card-body">
        <form action="/reset-password" method="post" id="form">
          <div class="form-group input-group">
            <div class="input-group-prepend"><span class="input-group-text"><i class="icon icon-envelope icon-fw"></i></span></div>
            <input type="email" class="form-control" placeholder="邮箱" name="email" id="email" required>
          </div>
          <div class="media">
            <div class="media-body">
              <div class="form-group input-group">
                <div class="input-group-prepend"><span class="input-group-text"><i class="icon icon-barcode icon-fw"></i></span></div>
                <input type="text" class="form-control" placeholder="验证码" name="code" id="code">
              </div>
            </div>
            <div class="align-self-center ml-1">
              <button type="button" class="btn btn-primary btn-sm ml-3 form-group" id="sendcode" data-loading-text="正在发送..." action="/reset-password/send-code">发送验证码</button>
            </div>
          </div>
          <div class="form-group">
            <button type="submit" class="btn btn-primary btn-block" id="submit" data-loading-text="正在提交...">下一步</button>
          </div>
          <div class="text-right">
            <a href="/login" class="text-muted"><small>用户登录</small></a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{{include "layout/footer.html" .}}
