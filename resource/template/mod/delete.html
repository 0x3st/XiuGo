<div class="card">
  <div class="card-header">删除主题</div>
  <div class="card-body ajax-body">
    <form action="/mod/delete" method="post" id="mod_delete_form">
      <div class="form-group row">
        <label class="col-4 form-control-label text-right">总共：</label>
        <div class="col-8"><span class="total font-weight-bold text-danger"></span> 篇</div>
      </div>
      <div class="form-group row">
        <label class="col-4"></label>
        <div class="col-8">
          <p class="text-danger">确定删除选中的主题吗？此操作不可恢复。</p>
          <button type="submit" class="btn btn-primary" data-loading-text="正在提交...">确定</button>
          <button type="button" class="btn btn-secondary" data-dismiss="modal">关闭</button>
        </div>
      </div>
    </form>
  </div>
</div>
<script ajax-eval="true">
var args = args || {jmodal: null, callback: null, arg: null};
var jmodal = args.jmodal, arg = args.arg;
var tidarr = $(arg).find('input[name="modtid"]').checked();
var jform = $('#mod_delete_form');
var jsubmit = jform.find('button[type="submit"]');
jform.find('span.total').text(tidarr.length);
jform.on('submit', function() {
  jform.reset(); jsubmit.button('loading');
  $.xpost(jform.attr('action'), {tidarr: tidarr}, function(code, message) {
    if(code == 0) {
      jsubmit.button(message);
      setTimeout(function(){ if(jmodal) jmodal.modal('dispose'); window.location.href='/'; }, 1000);
    } else { alert(message); jsubmit.button('reset'); }
  });
  return false;
});
jform.find('button[type="button"]').on('click', function(){ if(jmodal) jmodal.modal('dispose'); });
</script>
